<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест индикатора бесконечности</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        
        .test-buttons {
            text-align: center;
            margin-bottom: 20px;
        }
        
        button {
            background: #646cff;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        button:hover {
            background: #8b5cf6;
        }

        #futuristic-progress {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 26, 26, 0.95);
            border: 1px solid #646cff;
            border-radius: 12px;
            padding: 30px 40px;
            z-index: 10001;
            display: none;
            flex-direction: column;
            gap: 20px;
            min-width: 320px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            align-items: center;
        }

        .infinity-loader {
            width: 80px;
            height: 40px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .infinity-symbol {
            width: 80px;
            height: 40px;
            position: relative;
            transform: rotate(-45deg);
        }

        .infinity-symbol::before,
        .infinity-symbol::after {
            content: '';
            position: absolute;
            width: 32px;
            height: 32px;
            border: 3px solid transparent;
            border-radius: 50%;
            border-top-color: #646cff;
            border-right-color: #8b5cf6;
            border-bottom-color: #ec4899;
            border-left-color: #f59e0b;
            animation: infinityRotate 2s linear infinite, infinityColors 4s ease-in-out infinite;
        }

        .infinity-symbol::before {
            top: 0;
            left: 0;
            animation-delay: 0s;
        }

        .infinity-symbol::after {
            top: 0;
            right: 0;
            animation-delay: 1s;
            animation-direction: reverse;
        }

        @keyframes infinityRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes infinityColors {
            0%, 100% {
                border-top-color: #646cff;
                border-right-color: #8b5cf6;
                border-bottom-color: #ec4899;
                border-left-color: #f59e0b;
                box-shadow: 0 0 15px rgba(100, 108, 255, 0.6);
            }
            25% {
                border-top-color: #8b5cf6;
                border-right-color: #ec4899;
                border-bottom-color: #f59e0b;
                border-left-color: #10b981;
                box-shadow: 0 0 15px rgba(139, 92, 246, 0.6);
            }
            50% {
                border-top-color: #ec4899;
                border-right-color: #f59e0b;
                border-bottom-color: #10b981;
                border-left-color: #646cff;
                box-shadow: 0 0 15px rgba(236, 72, 153, 0.6);
            }
            75% {
                border-top-color: #f59e0b;
                border-right-color: #10b981;
                border-bottom-color: #646cff;
                border-left-color: #8b5cf6;
                box-shadow: 0 0 15px rgba(245, 158, 11, 0.6);
            }
        }

        #futuristic-progress .label {
            color: rgba(255, 255, 255, 0.87);
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="test-buttons">
        <h1>Тест индикатора загрузки "Бесконечность"</h1>
        <p>Нажмите кнопки для тестирования различных состояний индикатора:</p>
        <button onclick="showLoading('Загрузка панорам...')">Показать загрузку панорам</button>
        <button onclick="showLoading('Обработка изображения...')">Показать обработку</button>
        <button onclick="showLoading('Создание тура...')">Показать создание тура</button>
        <button onclick="hideLoading()">Скрыть индикатор</button>
        <button onclick="testSequence()">Тест последовательности</button>
    </div>

    <!-- Индикатор загрузки -->
    <div id="futuristic-progress">
        <div class="infinity-loader">
            <div class="infinity-symbol"></div>
        </div>
        <span class="label">Загрузка панорам...</span>
    </div>

    <script>
        function showLoading(text = 'Загрузка...') {
            const progress = document.getElementById('futuristic-progress');
            const label = progress.querySelector('.label');
            if (label) label.textContent = text;
            progress.style.display = 'flex';
        }

        function hideLoading() {
            const progress = document.getElementById('futuristic-progress');
            progress.style.display = 'none';
        }

        function testSequence() {
            const messages = [
                'Инициализация...',
                'Загрузка панорам...',
                'Обработка изображений...',
                'Создание маркеров...',
                'Генерация тура...',
                'Финализация...'
            ];
            
            let index = 0;
            showLoading(messages[index]);
            
            const interval = setInterval(() => {
                index++;
                if (index < messages.length) {
                    showLoading(messages[index]);
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        hideLoading();
                        alert('Тест завершен! Индикатор работает корректно.');
                    }, 1000);
                }
            }, 1500);
        }
    </script>
</body>
</html>
