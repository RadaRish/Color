<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Removed</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #1a1a1a;
        color: white;
        padding: 20px;
      }
      .test-section {
        background: #333;
        padding: 20px;
        border-radius: 8px;
        margin: 20px 0;
      }
      .controls {
        display: flex;
        gap: 10px;
        margin: 20px 0;
        flex-wrap: wrap;
      }
      button {
        padding: 10px 20px;
        background: #0066cc;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover {
        background: #0055aa;
      }
      button.danger {
        background: #cc3300;
      }
      button.success {
        background: #00cc66;
      }
      .log {
        background: #222;
        padding: 10px;
        border-radius: 4px;
        margin: 10px 0;
        font-family: monospace;
        max-height: 300px;
        overflow-y: auto;
        font-size: 12px;
      }
      .status {
        padding: 10px;
        border-radius: 4px;
        margin: 10px 0;
      }
      .status.success {
        background: #004400;
        color: #00ff00;
      }
      .status.error {
        background: #440000;
        color: #ff4444;
      }
      .status.warning {
        background: #444400;
        color: #ffff00;
      }
      .viewer-container {
        width: 100%;
        height: 300px;
        border: 2px solid #555;
        border-radius: 8px;
        margin: 20px 0;
        background: #222;
        position: relative;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <h1>Страница удалена</h1>

    <p>Эта отладочная страница удалена из продакшн-сборки.</p>
  </body>
</html>
